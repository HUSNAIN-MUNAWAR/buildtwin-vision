services:
  api:
    environment:
      DATABASE_URL: sqlite:////app/data/buildtwin.db
    volumes:
      - ./backend:/app/backend
      - ./sample_data:/app/sample_data
      - buildtwin_data:/app/data
    command: sh -c "cd /app/backend && alembic upgrade head && python -m app.cli seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
  web:
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    command: sh -c "cd /app/frontend && npm run dev"
volumes:
  buildtwin_data:
